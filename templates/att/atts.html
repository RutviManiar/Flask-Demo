{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h2>Attendance Records</h2>
  <a href="{{ url_for('att.add_attendance') }}" class="btn btn-success">+ Add Attendance</a>
</div>
<table class="table table-bordered table-striped">
  <thead class="table-success">
    <tr>
        <th>Employee</th>
        <th>Month</th>
        <th>Year</th>
        <th>Present Days</th>
        <th>Actions</th>
    </tr>
</thead>
<tbody>
    {% for r in records %}
    <tr>
        <td>{{ r.employee.ename }}</td>
        <td>{{ r.month }}</td>
        <td>{{ r.year }}</td>
        <td>{{ r.present_days }}</td>
    <td>
        <a href="{{ url_for('att.edit_att', id=r.id) }}" class="btn btn-warning btn-sm">Edit</a>
        <a href="{{ url_for('att.delete_att', id=r.id) }}" class="btn btn-danger btn-sm"
           onclick="return confirm('Are you sure you want to delete this attendance record?');">Delete</a>
      </td>
    </tr>
    {% endfor %}
    </tbody>
</table>
<div class="d-flex justify-content-between align-items-center mb-3">
  <a href="{{ url_for('index') }}" class="btn btn-success">Back</a>
</div>
{% endblock %}
