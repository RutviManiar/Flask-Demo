{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
  <div class="row">
    <div class="col-md-8 mx-auto">
      <h1 class="mb-4">✏️ Edit Announcement</h1>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="alert alert-{{ 'danger' if category == 'danger' else 'warning' }} alert-dismissible fade show" role="alert">
              {{ message }}
              <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <div class="card shadow">
        <div class="card-body">
          <form method="POST" action="{{ url_for('announcement.edit_announcement', announcement_id=announcement.id) }}">
            <div class="mb-3">
              <label for="title" class="form-label">Title</label>
              <input type="text" class="form-control form-control-lg" id="title" name="title" value="{{ announcement.title }}" required>
            </div>

            <div class="mb-3">
              <label for="content" class="form-label">Content</label>
              <textarea class="form-control" id="content" name="content" rows="8" required>{{ announcement.content }}</textarea>
            </div>

            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-warning btn-lg">💾 Update Announcement</button>
              <a href="{{ url_for('announcement.view_announcement', announcement_id=announcement.id) }}" class="btn btn-secondary btn-lg">Cancel</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
