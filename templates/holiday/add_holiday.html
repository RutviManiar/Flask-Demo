{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="card">
      <div class="card-header d-flex justify-content-between align-items-center">
        <h4 class="mb-0">Add Holiday</h4>
        <a href="{{ url_for('holiday.list_holidays') }}" class="btn btn-secondary btn-sm">Back to List</a>
      </div>
      <div class="card-body">
        <form method="POST">
          <div class="mb-3">
            <label for="name" class="form-label">Holiday Name *</label>
            <input type="text" class="form-control" id="name" name="name" required maxlength="100" placeholder="e.g., New Year's Day">
          </div>

          <div class="mb-3">
            <label for="date" class="form-label">Date *</label>
            <input type="date" class="form-control" id="date" name="date" required min="{{ today }}">
            <div class="form-text">Select the date for the holiday</div>
          </div>

          <div class="mb-3">
            <label for="description" class="form-label">Description</label>
            <textarea class="form-control" id="description" name="description" rows="3" placeholder="Optional description of the holiday"></textarea>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Add Holiday</button>
            <a href="{{ url_for('holiday.list_holidays') }}" class="btn btn-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
